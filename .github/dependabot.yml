version: 2
updates:
  # Go module dependencies (go.mod / go.sum)
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Dockerfile base images
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
